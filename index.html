<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental MEDcal | 雲端自動更新版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        .active-nav { color: #1d4ed8; border-bottom: 2px solid #1d4ed8; font-weight: 600; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10vh auto; padding: 30px; border-radius: 24px; width: 90%; max-width: 500px; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 flex items-center justify-between h-16">
            <div class="text-2xl font-bold text-blue-700 italic cursor-pointer" onclick="showPage('home')">Dental<span class="text-slate-400 not-italic">MEDcal</span></div>
            <div class="flex gap-6 h-full items-center text-sm">
                <button onclick="showPage('home')" id="nav-home" class="h-full active-nav">首頁</button>
                <button onclick="showPage('calendar')" id="nav-calendar" class="h-full text-slate-500">日曆</button>
                <button onclick="showPage('list')" id="nav-list" class="h-full text-slate-500">列表</button>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="loading" class="text-center py-20 text-slate-400">讀取最新牙科活動中...</div>
        
        <div id="page-home" class="page-content active space-y-10">
            <section>
                <h2 class="text-xl font-bold mb-6 flex justify-between items-center">本月精選活動 <span class="text-xs text-blue-600 font-normal">自動從 Google 表格同步</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="event-grid"></div>
            </section>
        </div>

        <div id="page-calendar" class="page-content">
            <div class="bg-white p-6 rounded-2xl border shadow-sm" id="full-calendar"></div>
        </div>

        <div id="page-list" class="page-content space-y-4" id="list-container"></div>
    </main>

    <div id="eventModal" class="modal" onclick="closeModal()"><div class="modal-content" id="modal-body" onclick="event.stopPropagation()"></div></div>

    <script>
        // ！！！這裡填入妳從 Google Sheets 複製的 CSV 網址 ！！！
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpJUZHak3Qd_ya8qFtCHShlQ8NsqeLmE4PqhTS4HAGVaVVwFELaaXcqP-GkQWDh6_v5raIM22SBhP8/pub?output=csv';

        let allEvents = [];

        async function init() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allEvents = results.data.filter(row => row.title); // 過濾掉空行
                    document.getElementById('loading').style.display = 'none';
                    renderUI();
                }
            });
        }

        function renderUI() {
            // 渲染首頁卡片
            const grid = document.getElementById('event-grid');
            grid.innerHTML = allEvents.map(ev => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-xl transition-all cursor-pointer" onclick="openEvent('${ev.id}')">
                    <div class="flex gap-4">
                        <div class="text-center"><span class="block text-3xl font-black text-blue-600">${ev.date.split('-')[2] || ''}</span><span class="text-[10px] text-slate-400 uppercase font-bold">${ev.date.split('-')[1] || ''}月</span></div>
                        <div class="space-y-2">
                            <span class="bg-blue-50 text-blue-700 text-[10px] px-2 py-0.5 rounded-full font-bold">${ev.cate}</span>
                            <h3 class="font-bold text-slate-800 leading-tight">${ev.title}</h3>
                            <p class="text-[11px] text-slate-400">📍 ${ev.loc}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openEvent(id) {
            const ev = allEvents.find(e => e.id == id);
            if(!ev) return;
            document.getElementById('modal-body').innerHTML = `
                <button class="absolute top-6 right-6 text-slate-300 hover:text-slate-600" onclick="closeModal()">✕</button>
                <div class="space-y-5">
                    <div class="space-y-1">
                        <span class="text-blue-600 font-bold text-sm">#${ev.cate}</span>
                        <h2 class="text-2xl font-extrabold text-slate-900">${ev.title}</h2>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl space-y-3 text-sm text-slate-600">
                        <p><b>📅 日期：</b> ${ev.date}</p>
                        <p><b>⏰ 時間：</b> ${ev.time}</p>
                        <p><b>🏢 主辦：</b> ${ev.org}</p>
                        <p><b>📍 地點：</b> ${ev.loc}</p>
                    </div>
                    <div class="flex flex-col gap-3">
                        <a href="${ev.url}" target="_blank" class="w-full bg-blue-600 text-white text-center py-3 rounded-xl font-bold shadow-lg shadow-blue-200">前往官方網址</a>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="window.open('https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title)}')" class="bg-white border border-slate-200 text-slate-700 py-3 rounded-xl text-sm font-bold hover:bg-slate-50">Google 日曆</button>
                            <button class="bg-white border border-slate-200 text-slate-700 py-3 rounded-xl text-sm font-bold hover:bg-slate-50">Apple 日曆</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('eventModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('eventModal').style.display = 'none'; }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active-nav');
            if(pageId === 'calendar') renderCalendar();
        }

        function renderCalendar() {
            var calendarEl = document.getElementById('full-calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                events: allEvents.map(e => ({ title: e.title, start: e.date, id: e.id })),
                eventClick: function(info) { openEvent(info.event.id); }
            });
            setTimeout(() => calendar.render(), 10);
        }

        init();
    </script>
</body>
</html>
