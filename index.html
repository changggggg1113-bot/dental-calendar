<div id="eventModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="h-24 bg-blue-600 p-6 flex justify-between items-end">
            <h2 id="modal-title" class="text-xl font-black text-white leading-tight line-clamp-2 pr-4"></h2>
            <button id="modal-fav-btn" class="text-2xl text-white mb-1">♡</button>
        </div>
        <div class="p-6 space-y-6">
            <div class="bg-slate-50 p-4 rounded-xl space-y-2 text-sm">
                <p><strong>時間：</strong><span id="modal-datetime"></span></p>
                <p><strong>地點：</strong><span id="modal-loc"></span></p>
                <p><strong>主辦：</strong><span id="modal-org"></span></p>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="addToGoogleCalendar()" class="bg-white border-2 border-blue-100 text-blue-600 py-3 rounded-xl text-xs font-black hover:bg-blue-50 transition-all flex items-center justify-center gap-2">
                    <span>📅 加入 Google 日曆</span>
                </button>
                <button onclick="downloadICS()" class="bg-white border-2 border-slate-100 text-slate-600 py-3 rounded-xl text-xs font-black hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                    <span>💾 下載 iCal (iOS)</span>
                </button>
            </div>

            <a id="modal-link" href="#" target="_blank" class="block w-full bg-blue-600 text-white text-center py-4 rounded-xl font-black shadow-lg shadow-blue-100">前往官方報名網址</a>
        </div>
    </div>
</div>

<script>
    // 在 script 標籤中加入這兩個核心函式

    function addToGoogleCalendar() {
        const ev = currentEvent; // 確保有抓到當前 modal 的活動
        if(!ev) return;
        
        // 格式化日期為 Google 格式 (YYYYMMDDTHHMMSSZ)
        const startDate = ev.date.replace(/-/g, '');
        const startTime = "090000"; // 預設早上9點
        const endTime = "170000";   // 預設下午5點
        
        const gCalUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title)}&dates=${startDate}T${startTime}/${startDate}T${endTime}&details=${encodeURIComponent('主辦單位: ' + ev.org + '\n報名網址: ' + ev.url)}&location=${encodeURIComponent(ev.loc)}`;
        
        window.open(gCalUrl, '_blank');
    }

    function downloadICS() {
        const ev = currentEvent;
        if(!ev) return;

        const startDate = ev.date.replace(/-/g, '');
        const icsContent = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "BEGIN:VEVENT",
            `DTSTART:${startDate}T090000`,
            `DTEND:${startDate}T170000`,
            `SUMMARY:${ev.title}`,
            `DESCRIPTION:主辦單位: ${ev.org}\\n網址: ${ev.url}`,
            `LOCATION:${ev.loc}`,
            "END:VEVENT",
            "END:VCALENDAR"
        ].join("\n");

        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.setAttribute('download', `${ev.title}.ics`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    
    // 記得在 openEvent 函式中加入這行，讓 currentEvent 被賦值
    let currentEvent = null;
    function openEvent(id) {
        const ev = allEvents.find(e => e.id == id);
        if(!ev) return;
        currentEvent = ev; // 存成全域變數供日曆功能使用
        // ... 原有的 modal 賦值邏輯 ...
        document.getElementById('eventModal').style.display = 'block';
    }
</script>
