<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental MEDcal | 牙科醫學會議日曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        .active-nav { color: #1d4ed8; border-bottom: 3px solid #1d4ed8; font-weight: 700; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 5vh auto; padding: 0; border-radius: 24px; width: 95%; max-width: 550px; position: relative; overflow: hidden; }
        #mobile-menu { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #mobile-menu.open { transform: translateX(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tag-active { background-color: #1d4ed8 !important; color: white !important; border-color: #1d4ed8 !important; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 flex items-center justify-between h-20">
            <div class="text-2xl md:text-3xl font-black text-blue-600 tracking-tighter cursor-pointer" onclick="showPage('home')">
                Dental<span class="text-slate-300 font-medium tracking-normal">MEDcal</span>
            </div>
            <div class="hidden lg:flex gap-8 h-full items-center text-sm font-bold text-slate-500">
                <button onclick="showPage('home')" id="nav-home" class="h-full px-2 active-nav">首頁</button>
                <button onclick="showPage('calendar')" id="nav-calendar" class="h-full px-2 hover:text-blue-600 transition-colors">日曆</button>
                <button onclick="showPage('list')" id="nav-list" class="h-full px-2 hover:text-blue-600 transition-colors">列表搜尋</button>
                <button onclick="showPage('societies')" id="nav-societies" class="h-full px-2 hover:text-blue-600 transition-colors">醫學會</button>
                <button onclick="showPage('fav')" id="nav-fav" class="h-full px-2 transition-colors">收藏 <span id="nav-fav-icon">♡</span></button>
            </div>
            <button class="lg:hidden p-2 text-slate-600" onclick="toggleMobileMenu()">
                <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 min-h-screen">
        <div id="loading" class="text-center py-40">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
            <p class="mt-4 text-slate-400 font-medium">資料同步中...</p>
        </div>
        
        <div id="page-home" class="page-content active space-y-12">
            <section class="bg-gradient-to-br from-blue-500 via-blue-600 to-indigo-500 rounded-[2.5rem] p-10 md:p-16 text-white shadow-xl shadow-blue-100/50 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                
                <div class="max-w-3xl relative z-10">
                    <h1 class="text-2xl md:text-4xl font-black mb-6 leading-relaxed tracking-wider">
                        掌握每一場<br>牙科醫學盛會
                    </h1>
                    <p class="text-blue-50 text-sm md:text-base font-medium mb-10 leading-loose opacity-90 tracking-wide">
                        專為專業牙醫師打造的學術日曆<br>
                        一鍵收藏、即時提醒，不遺漏任何學術成長機會。
                    </p>
                    
                    <div class="flex gap-10 border-t border-white/20 pt-10" id="stat-counters">
                        <div class="space-y-1">
                            <span class="block text-3xl font-black tracking-tight" id="stat-event-count">0</span>
                            <span class="text-[11px] text-blue-100 uppercase font-bold tracking-[0.15em] opacity-80">刊登活動</span>
                        </div>
                        <div class="space-y-1">
                            <span class="block text-3xl font-black tracking-tight" id="stat-org-count">0</span>
                            <span class="text-[11px] text-blue-100 uppercase font-bold tracking-[0.15em] opacity-80">醫學單位</span>
                        </div>
                        <div class="space-y-1">
                            <span class="block text-3xl font-black tracking-tight">2026</span>
                            <span class="text-[11px] text-blue-100 uppercase font-bold tracking-[0.15em] opacity-80">學術年度</span>
                        </div>
                    </div>
                </div>
            </section>

            <section id="recommendation-section">
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-2xl font-black text-slate-900 flex items-center gap-3" id="rec-title">✨ 為你推薦</h2>
                    <span id="rec-tag" class="text-[10px] font-bold text-slate-400 bg-white border border-slate-100 px-3 py-1.5 rounded-full tracking-widest uppercase shadow-sm">Hot</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="recommendation-grid"></div>
            </section>

            <section>
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-2xl font-black text-slate-900">本月精選活動</h2>
                    <span class="text-sm font-bold text-blue-600 cursor-pointer hover:underline" onclick="showPage('list')">進階搜尋 →</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="featured-grid"></div>
            </section>
        </div>

        <div id="page-list" class="page-content space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm space-y-6 border border-slate-100">
                <input type="text" id="searchInput" oninput="applyFilters()" placeholder="搜尋醫師、術式、材料..." class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                
                <div class="space-y-3">
                    <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="tag-container">
                        <button onclick="setQuickSearch('GBR', this)" class="quick-tag shrink-0 px-5 py-2.5 bg-slate-50 text-slate-600 rounded-full text-xs font-bold border border-slate-100 hover:bg-blue-600 hover:text-white transition-all"># GBR手術</button>
                        <button onclick="setQuickSearch('數位取模', this)" class="quick-tag shrink-0 px-5 py-2.5 bg-slate-50 text-slate-600 rounded-full text-xs font-bold border border-slate-100 hover:bg-blue-600 hover:text-white transition-all"># 數位取模</button>
                        <button onclick="setQuickSearch('人工植牙', this)" class="quick-tag shrink-0 px-5 py-2.5 bg-slate-50 text-slate-600 rounded-full text-xs font-bold border border-slate-100 hover:bg-blue-600 hover:text-white transition-all"># 人工植牙</button>
                        <button onclick="setQuickSearch('矯正', this)" class="quick-tag shrink-0 px-5 py-2.5 bg-slate-50 text-slate-600 rounded-full text-xs font-bold border border-slate-100 hover:bg-blue-600 hover:text-white transition-all"># 矯正</button>
                        <button onclick="setQuickSearch('再生醫學', this)" class="quick-tag shrink-0 px-5 py-2.5 bg-slate-50 text-slate-600 rounded-full text-xs font-bold border border-slate-100 hover:bg-blue-600 hover:text-white transition-all"># 再生醫學</button>
                        <button onclick="setQuickSearch('GP', this)" class="quick-tag shrink-0 px-5 py-2.5 bg-slate-50 text-slate-600 rounded-full text-xs font-bold border border-slate-100 hover:bg-blue-600 hover:text-white transition-all"># GP</button>
                    </div>
                </div>

                <div class="flex flex-wrap gap-3 pt-4 border-t border-slate-50">
                    <select id="filterOrg" onchange="applyFilters()" class="bg-slate-50 border border-slate-100 text-xs font-bold rounded-xl px-4 py-2.5 outline-none cursor-pointer hover:bg-white transition-all"><option value="">所有學會</option></select>
                    <select id="filterLoc" onchange="applyFilters()" class="bg-slate-50 border border-slate-100 text-xs font-bold rounded-xl px-4 py-2.5 outline-none cursor-pointer hover:bg-white transition-all"><option value="">地區</option></select>
                    <button id="btnCredit" onclick="toggleCreditFilter()" class="bg-slate-50 border border-slate-100 text-slate-500 text-xs font-bold rounded-xl px-4 py-2.5 transition-all hover:bg-white">🎓 有積分</button>
                    <button onclick="resetFilters()" class="text-xs text-slate-300 font-bold px-2 ml-auto hover:text-red-400 transition-colors">清除全部</button>
                </div>
            </div>
            <div id="agenda-container" class="space-y-8"></div>
        </div>

        <div id="page-fav" class="page-content space-y-6">
            <div class="text-center py-20" id="fav-empty">
                <div class="text-4xl mb-4 text-slate-200">♡</div>
                <h2 class="text-xl font-black text-slate-400 tracking-wider">目前沒有收藏的活動</h2>
            </div>
            <div id="fav-container" class="space-y-4"></div>
        </div>

        <div id="page-calendar" class="page-content"><div id="full-calendar" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100"></div></div>
        <div id="page-societies" class="page-content"><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" id="society-grid"></div></div>
    </main>

    <div id="eventModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-600 p-8 flex justify-between items-end relative overflow-hidden">
                <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-20 -mt-20 blur-2xl"></div>
                <h2 id="modal-title" class="text-xl font-black text-white leading-relaxed pr-6 z-10 tracking-wide"></h2>
                <button id="modal-fav-btn" class="flex flex-col items-center z-10 transition-transform active:scale-90">
                    <span id="modal-fav-heart" class="text-3xl leading-none">♡</span>
                    <span id="modal-fav-text" class="text-[9px] font-bold text-white/80 mt-1 uppercase tracking-widest">Save</span>
                </button>
            </div>
            <div class="p-8 space-y-8">
                <div class="bg-slate-50 p-6 rounded-2xl space-y-4 text-sm border border-slate-100">
                    <p class="flex items-start gap-4 text-slate-600"><span class="font-bold text-slate-900 shrink-0 w-12">時間</span><span id="modal-datetime" class="font-medium"></span></p>
                    <p class="flex items-start gap-4 text-slate-600"><span class="font-bold text-slate-900 shrink-0 w-12">地點</span><span id="modal-loc" class="font-medium"></span></p>
                    <p class="flex items-start gap-4 text-slate-600"><span class="font-bold text-slate-900 shrink-0 w-12">主辦</span><span id="modal-org" class="font-medium"></span></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="addToGoogleCalendar()" class="bg-[#4285F4] text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-blue-100 hover:brightness-110 transition-all">Google 日曆</button>
                    <button onclick="downloadICS()" class="bg-slate-800 text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-slate-200 hover:brightness-110 transition-all">加入 iPhone</button>
                </div>
                <a id="modal-link" href="#" target="_blank" class="block w-full bg-blue-600 text-white text-center py-5 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all">前往官方報名網址</a>
            </div>
        </div>
    </div>

    <script>
        // ... (保持原本 JavaScript 邏輯不變，僅針對配色與文字更新)
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpJUZHak3Qd_ya8qFtCHShlQ8NsqeLmE4PqhTS4HAGVaVVwFELaaXcqP-GkQWDh6_v5raIM22SBhP8/pub?output=csv';
        let allEvents = [];
        let favorites = JSON.parse(localStorage.getItem('medcal_favs')) || [];
        let isCreditOnly = false;
        let currentEvent = null;

        async function init() {
            Papa.parse(sheetUrl, {
                download: true, header: true,
                complete: function(results) {
                    allEvents = results.data.filter(row => row.title && row.date);
                    allEvents.sort((a, b) => new Date(b.date) - new Date(a.date));
                    document.getElementById('loading').style.display = 'none';
                    updateStats();
                    fillFilterOptions();
                    updateFavNavIcon();
                    renderAll();
                }
            });
        }

        function updateStats() {
            document.getElementById('stat-event-count').innerText = allEvents.length;
            const orgs = [...new Set(allEvents.map(e => e.org))];
            document.getElementById('stat-org-count').innerText = orgs.length;
        }

        function setQuickSearch(tag, btn) {
            document.querySelectorAll('.quick-tag').forEach(t => t.classList.remove('tag-active'));
            if(btn) btn.classList.add('tag-active');
            document.getElementById('searchInput').value = tag;
            applyFilters();
            showPage('list');
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('filterOrg').value = "";
            document.getElementById('filterLoc').value = "";
            isCreditOnly = false;
            document.querySelectorAll('.quick-tag').forEach(t => t.classList.remove('tag-active'));
            applyFilters();
        }

        function updateFavNavIcon() {
            const icon = favorites.length > 0 ? '♥' : '♡';
            const navIconEl = document.getElementById('nav-fav-icon');
            if (navIconEl) navIconEl.innerText = icon;
            document.querySelectorAll('.mobile-fav-icon').forEach(el => { el.innerText = icon; });
        }

        function toggleFav(id, event) {
            if(event) event.stopPropagation();
            const index = favorites.indexOf(id);
            if(index > -1) favorites.splice(index, 1);
            else favorites.push(id);
            localStorage.setItem('medcal_favs', JSON.stringify(favorites));
            updateFavNavIcon();
            updateModalFavUI(id);
            renderAll();
        }

        function updateModalFavUI(id) {
            const heart = document.getElementById('modal-fav-heart');
            const text = document.getElementById('modal-fav-text');
            if(!heart || !currentEvent || currentEvent.id !== id) return;
            const isFav = favorites.includes(id);
            heart.innerText = isFav ? '♥' : '♡';
            heart.style.color = isFav ? '#FFD700' : 'white';
            text.innerText = isFav ? 'Saved' : 'Save';
            text.style.color = isFav ? '#FFD700' : 'white';
        }

        function fillFilterOptions() {
            const orgs = [...new Set(allEvents.map(e => e.org))].sort();
            const locs = [...new Set(allEvents.map(e => e.loc.substring(0, 3)))].sort();
            const orgSelect = document.getElementById('filterOrg');
            const locSelect = document.getElementById('filterLoc');
            orgs.forEach(o => orgSelect.innerHTML += `<option value="${o}">${o}</option>`);
            locs.forEach(l => locSelect.innerHTML += `<option value="${l}">${l}</option>`);
        }

        function toggleCreditFilter() {
            isCreditOnly = !isCreditOnly;
            document.getElementById('btnCredit').classList.toggle('bg-blue-600', isCreditOnly);
            document.getElementById('btnCredit').classList.toggle('text-white', isCreditOnly);
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const org = document.getElementById('filterOrg').value;
            const loc = document.getElementById('filterLoc').value;
            const filtered = allEvents.filter(ev => {
                return (ev.title.toLowerCase().includes(q) || ev.org.toLowerCase().includes(q) || ev.type.toLowerCase().includes(q)) &&
                       (org === "" || ev.org === org) &&
                       (loc === "" || ev.loc.includes(loc)) &&
                       (!isCreditOnly || parseFloat(ev.credit) > 0);
            });
            renderList(filtered, 'agenda-container');
        }

        function renderAll() {
            renderHome();
            applyFilters();
            renderFavs();
            renderSocieties();
            renderRecommendations();
        }

        function renderRecommendations() {
            const recSection = document.getElementById('recommendation-section');
            const recGrid = document.getElementById('recommendation-grid');
            const recTitle = document.getElementById('rec-title');
            const recTag = document.getElementById('rec-tag');
            let recommendations = [];
            if (favorites.length === 0) {
                recTitle.innerText = "🔥 熱門活動";
                recTag.innerText = "Hot";
                recommendations = [...allEvents].sort(() => 0.5 - Math.random()).slice(0, 3);
            } else {
                recTitle.innerText = "✨ 為你推薦";
                recTag.innerText = "基於收藏";
                const favEvents = allEvents.filter(ev => favorites.includes(ev.id));
                const prefOrgs = getMostFrequent(favEvents.map(e => e.org));
                recommendations = allEvents.filter(ev => !favorites.includes(ev.id) && prefOrgs.includes(ev.org));
                if (recommendations.length < 3) {
                    recommendations = [...recommendations, ...allEvents.filter(e => !favorites.includes(e.id))].slice(0, 3);
                }
            }
            recGrid.innerHTML = recommendations.slice(0, 3).map(ev => createCard(ev, 'grid')).join('');
        }

        function getMostFrequent(arr) {
            const counts = arr.reduce((acc, val) => { acc[val] = (acc[val] || 0) + 1; return acc; }, {});
            return Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 2);
        }

        function renderHome() {
            const now = new Date();
            const thisMonth = allEvents.filter(ev => new Date(ev.date).getMonth() === now.getMonth()).slice(0, 6);
            document.getElementById('featured-grid').innerHTML = thisMonth.map(ev => createCard(ev, 'grid')).join('');
        }

        function renderFavs() {
            const favEvents = allEvents.filter(ev => favorites.includes(ev.id));
            const container = document.getElementById('fav-container');
            const empty = document.getElementById('fav-empty');
            if(favEvents.length > 0) {
                if(empty) empty.style.display = 'none';
                container.innerHTML = favEvents.map(ev => createCard(ev, 'row')).join('');
            } else {
                if(empty) empty.style.display = 'block';
                container.innerHTML = '';
            }
        }

        function renderList(data, containerId) {
            const groups = data.reduce((acc, ev) => {
                const d = ev.date;
                if (!acc[d]) acc[d] = [];
                acc[d].push(ev);
                return acc;
            }, {});
            const container = document.getElementById(containerId);
            if(!container) return;
            container.innerHTML = Object.keys(groups).map(date => `
                <div>
                    <h3 class="text-xs font-black text-slate-400 border-b pb-2 mb-4 tracking-widest uppercase">${date}</h3>
                    <div class="space-y-4">${groups[date].map(ev => createCard(ev, 'row')).join('')}</div>
                </div>`).join('');
        }

        function createCard(ev, style) {
            const dateObj = new Date(ev.date);
            const isFav = favorites.includes(ev.id);
            const heartIcon = isFav ? '♥' : '♡';
            if (style === 'grid') {
                return `<div class="bg-white p-8 rounded-[2rem] shadow-sm hover:shadow-xl transition-all cursor-pointer border border-slate-50" onclick="openEvent('${ev.id}')">
                    <div class="flex justify-between items-start mb-6">
                        <div class="text-center"><span class="block text-4xl font-black text-blue-600">${dateObj.getDate()}</span><span class="block text-[10px] font-bold text-slate-300 uppercase tracking-tighter">${dateObj.getMonth()+1}月</span></div>
                        <button onclick="toggleFav('${ev.id}', event)" class="text-2xl ${isFav ? 'text-blue-600' : 'text-slate-200'} transition-transform active:scale-75">${heartIcon}</button>
                    </div>
                    <h3 class="font-bold text-slate-800 line-clamp-2 leading-relaxed tracking-wide text-lg">${ev.title}</h3>
                </div>`;
            }
            return `<div class="bg-white p-6 rounded-[1.5rem] flex items-center gap-5 cursor-pointer shadow-sm hover:border-blue-200 border border-transparent transition-all group" onclick="openEvent('${ev.id}')">
                <div class="w-14 h-14 bg-slate-50 group-hover:bg-blue-50 rounded-2xl flex flex-col items-center justify-center shrink-0 font-black text-slate-400 group-hover:text-blue-600 transition-colors">
                    <span class="text-xl leading-none">${dateObj.getDate()}</span><span class="text-[9px] uppercase tracking-tighter">${dateObj.getMonth()+1}月</span>
                </div>
                <div class="flex-1 min-w-0">
                    <h4 class="font-bold text-slate-800 truncate text-base tracking-wide">${ev.title}</h4>
                    <p class="text-[11px] text-slate-400 mt-1 font-medium">${ev.org}</p>
                </div>
                <button onclick="toggleFav('${ev.id}', event)" class="p-2 ${isFav ? 'text-blue-600' : 'text-slate-200'} text-2xl transition-transform active:scale-75">${heartIcon}</button>
            </div>`;
        }

        function openEvent(id) {
            const ev = allEvents.find(e => e.id == id);
            if(!ev) return;
            currentEvent = ev;
            document.getElementById('modal-title').innerText = ev.title;
            document.getElementById('modal-datetime').innerText = `${ev.date} ${ev.time}`;
            document.getElementById('modal-loc').innerText = ev.loc;
            document.getElementById('modal-org').innerText = ev.org;
            document.getElementById('modal-link').href = ev.url;
            updateModalFavUI(ev.id);
            document.getElementById('eventModal').style.display = 'block';
        }

        function addToGoogleCalendar() {
            const start = currentEvent.date.replace(/-/g, '') + 'T090000Z';
            window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(currentEvent.title)}&dates=${start}/${start}&location=${encodeURIComponent(currentEvent.loc)}`, '_blank');
        }

        function downloadICS() {
            const start = currentEvent.date.replace(/-/g, '') + 'T090000Z';
            const icsData = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART:${start}`,`SUMMARY:${currentEvent.title}`,'END:VEVENT','END:VCALENDAR'].join('\n');
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(new Blob([icsData], { type: 'text/calendar;charset=utf-8' }));
            link.setAttribute('download', `${currentEvent.title}.ics`);
            link.click();
        }

        function closeModal() { document.getElementById('eventModal').style.display = 'none'; }
        function toggleMobileMenu() { 
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('open');
            document.getElementById('mobile-menu-overlay').classList.toggle('hidden');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('page-' + pageId).classList.add('active');
            const btn = document.getElementById('nav-' + pageId);
            if(btn) btn.classList.add('active-nav');
            if(pageId === 'calendar') renderCalendar();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderSocieties() {
            const orgs = [...new Set(allEvents.map(e => e.org))];
            document.getElementById('society-grid').innerHTML = orgs.map(org => `<div class="bg-white p-10 rounded-[2rem] text-center shadow-sm hover:shadow-md cursor-pointer transition-all border border-slate-50" onclick="filterByOrg('${org}')"><div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 font-black text-3xl">${allEvents.filter(e => e.org === org).length}</div><h4 class="font-black text-slate-800 text-sm tracking-wide">${org}</h4></div>`).join('');
        }

        function filterByOrg(orgName) { showPage('list'); document.getElementById('filterOrg').value = orgName; applyFilters(); }
        function renderCalendar() {
            var calendar = new FullCalendar.Calendar(document.getElementById('full-calendar'), {
                initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth', locale: 'zh-tw',
                events: allEvents.map(e => ({ title: e.title, start: e.date, id: e.id, backgroundColor: '#1d4ed8' })),
                eventClick: function(info) { openEvent(info.event.id); }
            });
            calendar.render();
        }

        init();
    </script>
</body>
</html>
