<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental MEDcal 牙科醫學會議日曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        .active-tab { border-bottom: 2px solid #1D4ED8; color: #1D4ED8; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 flex items-center justify-between h-16">
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold text-blue-700">Dental<span class="text-slate-400 font-normal">Cal</span></span>
            </div>
            <div class="flex gap-8 h-full">
                <button onclick="showTab('calendar-tab')" id="btn-calendar" class="nav-btn flex items-center active-tab">日曆</button>
                <button onclick="showTab('agenda-tab')" id="btn-agenda" class="nav-btn flex items-center text-slate-500">議程列表</button>
                <button onclick="showTab('societies-tab')" id="btn-societies" class="nav-btn flex items-center text-slate-500">醫學會</button>
            </div>
            <div class="w-20 text-right text-slate-400">🔍</div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        
        <div id="calendar-tab" class="tab-content active">
            <div class="bg-white p-6 rounded-2xl shadow-sm border" id="calendar"></div>
        </div>

        <div id="agenda-tab" class="tab-content">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">本月精選活動</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex gap-4">
                    <div class="text-center w-16">
                        <span class="block text-3xl font-bold text-blue-600">20</span>
                        <span class="block text-xs text-slate-500 mt-1">3月 週五</span>
                    </div>
                    <div>
                        <div class="flex gap-2 mb-2">
                            <span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full">實體</span>
                            <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded-full">矯正學會</span>
                        </div>
                        <h3 class="font-bold text-lg mb-2">劉醫師 (Dr. Liu Chun-Lin) IIP 實戰營</h3>
                        <p class="text-sm text-slate-500 leading-relaxed">🕒 13:00 - 17:00 | 📍 北醫大</p>
                    </div>
                </div>
                </div>
        </div>

        <div id="societies-tab" class="tab-content">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">牙科醫學會目錄</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border text-center hover:shadow-md cursor-pointer">中華民國牙醫師公會</div>
                <div class="bg-white p-4 rounded-xl border text-center hover:shadow-md cursor-pointer">台灣矯正醫學會 (TAO)</div>
                <div class="bg-white p-4 rounded-xl border text-center hover:shadow-md cursor-pointer">ADI 植牙醫學會</div>
                <div class="bg-white p-4 rounded-xl border text-center hover:shadow-md cursor-pointer">北醫牙科校友會</div>
            </div>
        </div>

    </main>

    <script>
        // 分頁切換邏輯
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active-tab', 'text-blue-700'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.add('text-slate-500'));
            
            document.getElementById(tabId).classList.add('active');
            const btnId = 'btn-' + tabId.split('-')[0];
            document.getElementById(btnId).classList.add('active-tab');
            document.getElementById(btnId).classList.remove('text-slate-500');

            if(tabId === 'calendar-tab') {
                setTimeout(() => { calendar.render(); }, 10);
            }
        }

        // 初始化日曆
        let calendar;
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                events: [
                    { title: '劉醫師 IIP 課程', start: '2026-03-20', color: '#1D4ED8' }
                ]
            });
            calendar.render();
        });
    </script>
</body>
</html>
