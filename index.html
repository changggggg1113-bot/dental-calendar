<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牙科醫學會議日曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold text-blue-700">Dental Cal 牙科日曆</h1>
        <nav class="space-x-4">
            <a href="#" class="text-blue-600 font-medium">日曆</a>
            <a href="#" class="text-slate-500 hover:text-blue-600">學會清單</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto p-6 flex gap-6">
        <aside class="w-64 space-y-6 hidden md:block">
            <div>
                <h3 class="font-bold mb-3">科別篩選</h3>
                <div class="space-y-2">
                    <label class="flex items-center gap-2"><input type="checkbox" checked> 植牙 (Implant)</label>
                    <label class="flex items-center gap-2"><input type="checkbox" checked> 矯正 (Ortho)</label>
                    <label class="flex items-center gap-2"><input type="checkbox" checked> 牙周 (Perio)</label>
                </div>
            </div>
        </aside>

        <div class="flex-1 bg-white p-4 rounded-xl shadow-sm border" id="calendar"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                events: [
                    { title: '陳醫師-植牙大會', start: '2026-03-25', color: '#1d4ed8' },
                    { title: '劉醫師-矯正工作坊', start: '2026-03-28', color: '#059669' }
                ]
            });
            calendar.render();
        });
    </script>
</body>
</html>
