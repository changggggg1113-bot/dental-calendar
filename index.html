<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental MEDcal | 牙科醫學會議日曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        .active-nav { color: #1d4ed8; border-bottom: 3px solid #1d4ed8; font-weight: 700; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 5vh auto; border-radius: 32px; width: 95%; max-width: 550px; overflow: hidden; border: 1px solid rgba(241, 245, 249, 1); }
        #mobile-menu { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #mobile-menu.open { transform: translateX(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tag-active { background-color: #1e40af !important; color: white !important; }
    </style>
</head>
<body class="bg-[#FBFDFF] text-slate-800">

    <header class="bg-white/70 backdrop-blur-xl border-b border-slate-50 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-8 flex items-center justify-between h-20">
            <div class="text-2xl font-black text-blue-600 tracking-tighter cursor-pointer" onclick="showPage('home')">
                Dental<span class="text-slate-300 font-medium tracking-normal ml-0.5">MEDcal</span>
            </div>
            <div class="hidden lg:flex gap-10 items-center text-sm font-bold text-slate-400">
                <button onclick="showPage('home')" id="nav-home" class="h-20 px-2 active-nav">首頁</button>
                <button onclick="showPage('calendar')" id="nav-calendar" class="h-20 px-2 hover:text-blue-600 transition-colors">日曆</button>
                <button onclick="showPage('list')" id="nav-list" class="h-20 px-2 hover:text-blue-600 transition-colors">搜尋</button>
                <button onclick="showPage('societies')" id="nav-societies" class="h-20 px-2 hover:text-blue-600 transition-colors">醫學會</button>
                <button onclick="showPage('fav')" id="nav-fav" class="h-20 px-2 transition-colors">收藏 <span id="nav-fav-icon">♡</span></button>
            </div>
            <button class="lg:hidden p-2 text-slate-400" onclick="toggleMobileMenu()">
                <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 8h16M4 16h16" stroke-width="2.5" stroke-linecap="round"/></svg>
            </button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-10">
        <div id="loading" class="text-center py-40">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-blue-600 border-t-transparent"></div>
        </div>
        
        <div id="page-home" class="page-content active space-y-16">
            <section class="relative py-12 md:py-20 px-4">
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl h-64 bg-blue-50/50 blur-[100px] rounded-full -z-10"></div>
                <div class="text-center space-y-6">
                    <h1 class="text-3xl md:text-5xl font-black text-slate-900 leading-tight tracking-wider">掌握每一場 <span class="text-blue-600">牙科醫學盛會</span></h1>
                    <p class="text-slate-400 text-sm md:text-lg font-medium max-w-2xl mx-auto leading-relaxed tracking-wide">為專業醫師打造的質感日曆，整合全台學術資訊。<br>一鍵加入收藏與系統提醒，讓成長變得優雅從容。</p>
                    <div class="flex justify-center gap-12 md:gap-20 pt-10">
                        <div class="text-center">
                            <span class="block text-3xl font-black text-slate-800" id="stat-event-count">0</span>
                            <span class="text-[11px] text-slate-400 font-bold tracking-[0.2em] uppercase">刊登活動</span>
                        </div>
                        <div class="text-center">
                            <span class="block text-3xl font-black text-slate-800" id="stat-org-count">0</span>
                            <span class="text-[11px] text-slate-400 font-bold tracking-[0.2em] uppercase">醫學單位</span>
                        </div>
                        <div class="text-center">
                            <span class="block text-3xl font-black text-slate-800">2026</span>
                            <span class="text-[11px] text-slate-400 font-bold tracking-[0.2em] uppercase">年度</span>
                        </div>
                    </div>
                </div>
            </section>

            <section id="recommendation-section">
                <div class="flex items-center gap-4 mb-8">
                    <h2 class="text-2xl font-black text-slate-900" id="rec-title">✨ 為你推薦</h2>
                    <div class="h-px flex-1 bg-slate-100"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="recommendation-grid"></div>
            </section>

            <section>
                <div class="flex items-center gap-4 mb-8">
                    <h2 class="text-2xl font-black text-slate-900">本月精選活動</h2>
                    <div class="h-px flex-1 bg-slate-100"></div>
                    <span class="text-sm font-bold text-blue-600 cursor-pointer hover:bg-blue-50 px-4 py-2 rounded-full transition-all" onclick="showPage('list')">查看更多 →</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="featured-grid"></div>
            </section>
        </div>

        <div id="page-list" class="page-content space-y-8">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm space-y-8 border border-slate-50">
                <input type="text" id="searchInput" oninput="applyFilters()" placeholder="搜尋關鍵字..." class="w-full bg-slate-50/50 border border-slate-100 rounded-[1.25rem] px-8 py-5 text-base outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 transition-all">
                <div class="flex overflow-x-auto no-scrollbar gap-3 pb-1" id="tag-container">
                    <button onclick="setQuickSearch('GBR', this)" class="quick-tag shrink-0 px-6 py-3 bg-white text-slate-500 rounded-2xl text-xs font-bold border border-slate-100 hover:border-blue-500 hover:text-blue-600 transition-all shadow-sm"># GBR手術</button>
                    <button onclick="setQuickSearch('數位取模', this)" class="quick-tag shrink-0 px-6 py-3 bg-white text-slate-500 rounded-2xl text-xs font-bold border border-slate-100 hover:border-blue-500 hover:text-blue-600 transition-all shadow-sm"># 數位取模</button>
                    <button onclick="setQuickSearch('人工植牙', this)" class="quick-tag shrink-0 px-6 py-3 bg-white text-slate-500 rounded-2xl text-xs font-bold border border-slate-100 hover:border-blue-500 hover:text-blue-600 transition-all shadow-sm"># 人工植牙</button>
                    <button onclick="setQuickSearch('矯正', this)" class="quick-tag shrink-0 px-6 py-3 bg-white text-slate-500 rounded-2xl text-xs font-bold border border-slate-100 hover:border-blue-500 hover:text-blue-600 transition-all shadow-sm"># 矯正</button>
                    <button onclick="setQuickSearch('再生醫學', this)" class="quick-tag shrink-0 px-6 py-3 bg-white text-slate-500 rounded-2xl text-xs font-bold border border-slate-100 hover:border-blue-500 hover:text-blue-600 transition-all shadow-sm"># 再生醫學</button>
                </div>
                <div class="flex flex-wrap gap-4 pt-6 border-t border-slate-50">
                    <select id="filterOrg" onchange="applyFilters()" class="bg-slate-50/50 border border-slate-100 text-xs font-bold rounded-xl px-5 py-3 outline-none hover:bg-white transition-all"><option value="">所有學會</option></select>
                    <select id="filterLoc" onchange="applyFilters()" class="bg-slate-50/50 border border-slate-100 text-xs font-bold rounded-xl px-5 py-3 outline-none hover:bg-white transition-all"><option value="">所有地區</option></select>
                    <button id="btnCredit" onclick="toggleCreditFilter()" class="bg-slate-50/50 border border-slate-100 text-slate-500 text-xs font-bold rounded-xl px-5 py-3 transition-all hover:bg-white">🎓 有積分</button>
                    <button onclick="resetFilters()" class="text-xs text-slate-300 font-bold px-4 ml-auto hover:text-red-400">清除篩選</button>
                </div>
            </div>
            <div id="agenda-container" class="space-y-10 pt-4"></div>
        </div>

        <div id="page-fav" class="page-content space-y-6"><div id="fav-empty" class="text-center py-20 text-slate-300 font-bold">目前沒有收藏的活動</div><div id="fav-container" class="space-y-6"></div></div>
        <div id="page-calendar" class="page-content"><div id="full-calendar" class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50"></div></div>
        <div id="page-societies" class="page-content"><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8" id="society-grid"></div></div>
    </main>

    <div id="eventModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="h-32 bg-slate-900 p-8 flex justify-between items-end relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 border-[20px] border-white/5 rounded-full -mr-10 -mt-10"></div>
                <h2 id="modal-title" class="text-xl font-black text-white leading-relaxed pr-6 z-10 tracking-wide"></h2>
                <button id="modal-fav-btn" onclick="toggleFav(currentEvent.id, event)" class="flex flex-col items-center z-10 outline-none">
                    <span id="modal-fav-heart" class="text-3xl leading-none transition-all">♡</span>
                    <span id="modal-fav-text" class="text-[9px] font-bold text-white/50 mt-1 uppercase tracking-widest transition-all">Save</span>
                </button>
            </div>
            <div class="p-8 space-y-8">
                <div class="space-y-5 text-sm">
                    <p class="flex items-start gap-4 text-slate-500"><span class="font-bold text-slate-900 shrink-0 w-12">時間</span><span id="modal-datetime"></span></p>
                    <p class="flex items-start gap-4 text-slate-500"><span class="font-bold text-slate-900 shrink-0 w-12">地點</span><span id="modal-loc"></span></p>
                    <p class="flex items-start gap-4 text-slate-500"><span class="font-bold text-slate-900 shrink-0 w-12">主辦</span><span id="modal-org"></span></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="addToGoogleCalendar()" class="bg-[#4285F4] text-white py-4 rounded-2xl text-xs font-black shadow-xl shadow-blue-500/10 active:scale-95 transition-all">Google 日曆</button>
                    <button onclick="downloadICS()" class="bg-slate-800 text-white py-4 rounded-2xl text-xs font-black shadow-xl shadow-slate-900/10 active:scale-95 transition-all">加入 iPhone</button>
                </div>
                <a id="modal-link" href="#" target="_blank" class="block w-full bg-blue-600 text-white text-center py-5 rounded-2xl font-black shadow-2xl shadow-blue-600/20 active:scale-95 transition-all">前往官方報名網址</a>
            </div>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpJUZHak3Qd_ya8qFtCHShlQ8NsqeLmE4PqhTS4HAGVaVVwFELaaXcqP-GkQWDh6_v5raIM22SBhP8/pub?output=csv';
        let allEvents = [];
        let favorites = JSON.parse(localStorage.getItem('medcal_favs')) || [];
        let isCreditOnly = false;
        let currentEvent = null;

        async function init() {
            Papa.parse(sheetUrl, {
                download: true, header: true,
                complete: function(results) {
                    allEvents = results.data.filter(row => row.title && row.date);
                    allEvents.sort((a, b) => new Date(b.date) - new Date(a.date));
                    document.getElementById('loading').style.display = 'none';
                    updateStats();
                    fillFilterOptions();
                    updateFavNavIcon();
                    renderAll();
                }
            });
        }

        function updateStats() {
            document.getElementById('stat-event-count').innerText = allEvents.length;
            const orgs = [...new Set(allEvents.map(e => e.org))];
            document.getElementById('stat-org-count').innerText = orgs.length;
        }

        function setQuickSearch(tag, btn) {
            document.querySelectorAll('.quick-tag').forEach(t => t.classList.remove('tag-active'));
            if(btn) btn.classList.add('tag-active');
            document.getElementById('searchInput').value = tag;
            applyFilters();
            showPage('list');
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('filterOrg').value = "";
            document.getElementById('filterLoc').value = "";
            isCreditOnly = false;
            document.querySelectorAll('.quick-tag').forEach(t => t.classList.remove('tag-active'));
            applyFilters();
        }

        function updateFavNavIcon() {
            const icon = favorites.length > 0 ? '♥' : '♡';
            const navIconEl = document.getElementById('nav-fav-icon');
            if (navIconEl) navIconEl.innerText = icon;
            document.querySelectorAll('.mobile-fav-icon').forEach(el => { el.innerText = icon; });
        }

        function toggleFav(id, event) {
            if(event) event.stopPropagation();
            const index = favorites.indexOf(id);
            if(index > -1) favorites.splice(index, 1);
            else favorites.push(id);
            localStorage.setItem('medcal_favs', JSON.stringify(favorites));
            
            updateFavNavIcon();
            updateModalFavUI(id); // 這裡會立刻更新畫面的愛心
            renderAll();
        }

        function updateModalFavUI(id) {
            const heart = document.getElementById('modal-fav-heart');
            const text = document.getElementById('modal-fav-text');
            if(!heart || !text) return;
            
            const isFav = favorites.includes(id);
            heart.innerText = isFav ? '♥' : '♡';
            heart.style.color = isFav ? '#FFD700' : 'white'; // 收藏後變黃色
            text.innerText = isFav ? 'Saved' : 'Save';
            text.style.color = isFav ? '#FFD700' : 'rgba(255, 255, 255, 0.5)';
        }

        function fillFilterOptions() {
            const orgs = [...new Set(allEvents.map(e => e.org))].sort();
            const locs = [...new Set(allEvents.map(e => e.loc.substring(0, 3)))].sort();
            const orgSelect = document.getElementById('filterOrg');
            const locSelect = document.getElementById('filterLoc');
            orgs.forEach(o => orgSelect.innerHTML += `<option value="${o}">${o}</option>`);
            locs.forEach(l => locSelect.innerHTML += `<option value="${l}">${l}</option>`);
        }

        function toggleCreditFilter() {
            isCreditOnly = !isCreditOnly;
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const org = document.getElementById('filterOrg').value;
            const loc = document.getElementById('filterLoc').value;
            const filtered = allEvents.filter(ev => {
                return (ev.title.toLowerCase().includes(q) || ev.org.toLowerCase().includes(q) || (ev.type && ev.type.toLowerCase().includes(q))) &&
                       (org === "" || ev.org === org) &&
                       (loc === "" || ev.loc.includes(loc)) &&
                       (!isCreditOnly || (ev.credit && parseFloat(ev.credit) > 0));
            });
            renderList(filtered, 'agenda-container');
        }

        function renderAll() {
            renderHome();
            renderFavs();
            renderSocieties();
            renderRecommendations();
        }

        function renderRecommendations() {
            const recGrid = document.getElementById('recommendation-grid');
            const recTitle = document.getElementById('rec-title');
            let recommendations = [];
            if (favorites.length === 0) {
                recTitle.innerText = "🔥 探索活動";
                recommendations = [...allEvents].sort(() => 0.5 - Math.random()).slice(0, 3);
            } else {
                recTitle.innerText = "✨ 為你推薦";
                const favEvents = allEvents.filter(ev => favorites.includes(ev.id));
                const prefOrgs = getMostFrequent(favEvents.map(e => e.org));
                recommendations = allEvents.filter(ev => !favorites.includes(ev.id) && prefOrgs.includes(ev.org)).slice(0, 3);
                if (recommendations.length < 3) recommendations = [...recommendations, ...allEvents.filter(e => !favorites.includes(e.id))].slice(0, 3);
            }
            recGrid.innerHTML = recommendations.map(ev => createCard(ev, 'grid')).join('');
        }

        function getMostFrequent(arr) {
            const counts = arr.reduce((acc, val) => { acc[val] = (acc[val] || 0) + 1; return acc; }, {});
            return Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 2);
        }

        function renderHome() {
            const now = new Date();
            const thisMonth = allEvents.filter(ev => new Date(ev.date).getMonth() === now.getMonth()).slice(0, 6);
            document.getElementById('featured-grid').innerHTML = thisMonth.map(ev => createCard(ev, 'grid')).join('');
        }

        function renderFavs() {
            const favEvents = allEvents.filter(ev => favorites.includes(ev.id));
            const container = document.getElementById('fav-container');
            const empty = document.getElementById('fav-empty');
            if(favEvents.length > 0) {
                empty.style.display = 'none';
                container.innerHTML = favEvents.map(ev => createCard(ev, 'row')).join('');
            } else {
                empty.style.display = 'block';
                container.innerHTML = '';
            }
        }

        function renderList(data, containerId) {
            const groups = data.reduce((acc, ev) => {
                const d = ev.date;
                if (!acc[d]) acc[d] = [];
                acc[d].push(ev);
                return acc;
            }, {});
            const container = document.getElementById(containerId);
            if(!container) return;
            container.innerHTML = Object.keys(groups).map(date => `
                <div>
                    <h3 class="text-[11px] font-black text-slate-300 mb-6 tracking-[0.3em] uppercase pl-1">${date}</h3>
                    <div class="space-y-6">${groups[date].map(ev => createCard(ev, 'row')).join('')}</div>
                </div>`).join('');
        }

        function createCard(ev, style) {
            const dateObj = new Date(ev.date);
            const isFav = favorites.includes(ev.id);
            const heartIcon = isFav ? '♥' : '♡';
            if (style === 'grid') {
                return `<div class="bg-white p-10 rounded-[2.5rem] shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer border border-slate-50 group" onclick="openEvent('${ev.id}')">
                    <div class="flex justify-between items-start mb-8">
                        <div class="text-center"><span class="block text-4xl font-black text-slate-800">${dateObj.getDate()}</span><span class="block text-[10px] font-bold text-slate-300 uppercase tracking-widest mt-1">${dateObj.getMonth()+1}月</span></div>
                        <button onclick="toggleFav('${ev.id}', event)" class="text-2xl ${isFav ? 'text-blue-600' : 'text-slate-200'} transition-transform active:scale-75">${heartIcon}</button>
                    </div>
                    <h3 class="font-bold text-slate-800 line-clamp-2 leading-relaxed text-lg group-hover:text-blue-600 transition-colors">${ev.title}</h3>
                </div>`;
            }
            return `<div class="bg-white p-8 rounded-[2rem] flex items-center gap-8 cursor-pointer shadow-sm hover:border-blue-100 border border-transparent transition-all group" onclick="openEvent('${ev.id}')">
                <div class="w-16 h-16 bg-slate-50 rounded-2xl flex flex-col items-center justify-center shrink-0 group-hover:bg-blue-50 transition-colors">
                    <span class="text-2xl font-black text-slate-400 group-hover:text-blue-600">${dateObj.getDate()}</span><span class="text-[9px] text-slate-300 uppercase font-bold tracking-tighter">${dateObj.getMonth()+1}月</span>
                </div>
                <div class="flex-1 min-w-0">
                    <h4 class="font-bold text-slate-800 truncate text-lg tracking-wide group-hover:text-blue-600 transition-colors">${ev.title}</h4>
                    <p class="text-xs text-slate-400 mt-1 font-medium">${ev.org}</p>
                </div>
                <button onclick="toggleFav('${ev.id}', event)" class="p-2 ${isFav ? 'text-blue-600' : 'text-slate-200'} text-2xl transition-transform active:scale-75">${heartIcon}</button>
            </div>`;
        }

        function openEvent(id) {
            const ev = allEvents.find(e => e.id == id);
            if(!ev) return;
            currentEvent = ev;
            document.getElementById('modal-title').innerText = ev.title;
            document.getElementById('modal-datetime').innerText = `${ev.date} ${ev.time}`;
            document.getElementById('modal-loc').innerText = ev.loc;
            document.getElementById('modal-org').innerText = ev.org;
            document.getElementById('modal-link').href = ev.url;
            updateModalFavUI(id); // 打開 Modal 時先初始化 UI
            document.getElementById('eventModal').style.display = 'block';
        }

        function addToGoogleCalendar() {
            const start = currentEvent.date.replace(/-/g, '') + 'T090000Z';
            window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(currentEvent.title)}&dates=${start}/${start}&location=${encodeURIComponent(currentEvent.loc)}`, '_blank');
        }

        function downloadICS() {
            const start = currentEvent.date.replace(/-/g, '') + 'T090000Z';
            const icsData = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART:${start}`,`SUMMARY:${currentEvent.title}`,'END:VEVENT','END:VCALENDAR'].join('\n');
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(new Blob([icsData], { type: 'text/calendar;charset=utf-8' }));
            link.setAttribute('download', `${currentEvent.title}.ics`);
            link.click();
        }

        function closeModal() { document.getElementById('eventModal').style.display = 'none'; }
        function toggleMobileMenu() { 
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('open');
            document.getElementById('mobile-menu-overlay').classList.toggle('hidden');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('page-' + pageId).classList.add('active');
            const btn = document.getElementById('nav-' + pageId);
            if(btn) btn.classList.add('active-nav');
            if(pageId === 'calendar') renderCalendar();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderSocieties() {
            const orgs = [...new Set(allEvents.map(e => e.org))];
            document.getElementById('society-grid').innerHTML = orgs.map(org => `<div class="bg-white p-12 rounded-[2.5rem] text-center shadow-sm hover:shadow-md cursor-pointer transition-all border border-slate-50" onclick="filterByOrg('${org}')"><div class="w-20 h-20 bg-slate-50 text-slate-400 rounded-3xl flex items-center justify-center mx-auto mb-6 font-black text-3xl">${allEvents.filter(e => e.org === org).length}</div><h4 class="font-black text-slate-800 text-sm tracking-wide">${org}</h4></div>`).join('');
        }

        function filterByOrg(orgName) { showPage('list'); document.getElementById('filterOrg').value = orgName; applyFilters(); }
        function renderCalendar() {
            var calendar = new FullCalendar.Calendar(document.getElementById('full-calendar'), {
                initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth', locale: 'zh-tw',
                events: allEvents.map(e => ({ title: e.title, start: e.date, id: e.id, backgroundColor: '#1d4ed8' })),
                eventClick: function(info) { openEvent(info.event.id); }
            });
            calendar.render();
        }

        init();
    </script>
</body>
</html>
